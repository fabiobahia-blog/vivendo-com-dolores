<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entre em contato | Vivendo Entre Dolores</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self'; img-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="analytics.config.js"></script>
    <script src="analytics.js" defer></script>
    <script src="contact.js" defer></script>
  </head>
  <body>
    <header>
      <div class="container">
        <h1 class="site-title">Vivendo Entre Dolores</h1>
        <p class="site-subtitle">
          Minha experiência com dor crônica e trombose porto-mesentérica
        </p>
        <nav>
          <a href="index.html">Início</a>
          <a href="sobre.html">Sobre mim</a>
          <a href="contato.html">Contato</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <article>
          <h2>Entre em contato</h2>
          <p class="form-note">
            Preencha o formulário abaixo. Ao enviar, o seu aplicativo de email
            vai abrir com a mensagem pronta.
          </p>

          <form id="contactForm" class="contact-form" novalidate>
            <div class="form-field">
              <label for="nome">Nome</label>
              <input
                id="nome"
                name="nome"
                type="text"
                maxlength="80"
                autocomplete="name"
                required
              />
            </div>

            <div class="form-field">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                maxlength="120"
                inputmode="email"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-field">
              <label for="mensagem">Mensagem</label>
              <textarea
                id="mensagem"
                name="mensagem"
                rows="5"
                maxlength="2000"
                required
              ></textarea>
            </div>

            <div class="form-field honeypot" aria-hidden="true">
              <label for="website">Website</label>
              <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
            </div>

            <div class="form-field">
              <label id="humanLabel" for="humano">Confirme que é humano</label>
              <input id="humano" name="humano" type="number" inputmode="numeric" required />
            </div>

            <button type="submit">Enviar</button>
            <p id="feedback" class="form-feedback" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>Sua mensagem é importante para mim.</p>
      </div>
    </footer>

  </body>
</html>

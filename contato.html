<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entre em contato | Vivendo Entre Dores</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1 class="site-title">Vivendo Entre Dores</h1>
        <p class="site-subtitle">
          Minha experiência com dor crônica e trombose porto-mesentérica
        </p>
        <nav>
          <a href="index.html">Início</a>
          <a href="sobre.html">Sobre mim</a>
          <a href="contato.html">Contato</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <article>
          <h2>Entre em contato</h2>
          <p class="form-note">
            Preencha o formulário abaixo. Ao enviar, o seu aplicativo de email
            vai abrir com a mensagem pronta.
          </p>

          <form id="contactForm" class="contact-form">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" required></textarea>

            <label id="humanLabel" for="humano">Confirme que é humano</label>
            <input id="humano" name="humano" type="number" required />

            <button type="submit">Enviar</button>
            <p id="feedback" class="form-feedback" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>Sua mensagem é importante para mim.</p>
      </div>
    </footer>

    <script>
      (function () {
        const form = document.getElementById("contactForm");
        const humanLabel = document.getElementById("humanLabel");
        const feedback = document.getElementById("feedback");
        const emailDestino = "fbahia@hotmail.com";

        const a = Math.floor(Math.random() * 7) + 2;
        const b = Math.floor(Math.random() * 7) + 2;
        const resposta = a + b;
        humanLabel.textContent = "Confirme que é humano: quanto é " + a + " + " + b + "?";

        form.addEventListener("submit", function (event) {
          event.preventDefault();

          const nome = document.getElementById("nome").value.trim();
          const email = document.getElementById("email").value.trim();
          const mensagem = document.getElementById("mensagem").value.trim();
          const humano = Number(document.getElementById("humano").value);

          if (humano !== resposta) {
            feedback.textContent = "Confirmação de humano inválida. Tente novamente.";
            return;
          }

          const assunto = encodeURIComponent("Contato pelo blog - " + nome);
          const corpo = encodeURIComponent(
            "Nome: " +
              nome +
              "\nEmail: " +
              email +
              "\n\nMensagem:\n" +
              mensagem
          );

          window.location.href = "mailto:" + emailDestino + "?subject=" + assunto + "&body=" + corpo;
          feedback.textContent = "Abrindo seu aplicativo de email para finalizar o envio.";
        });
      })();
    </script>
  </body>
</html>
